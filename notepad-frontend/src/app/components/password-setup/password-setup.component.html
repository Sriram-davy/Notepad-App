<div class="setup-container">
  <div class="setup-card glass">
    <div class="header">
      <button class="back-btn" [routerLink]="['/', username]">←</button>
      <h1>Secure your Notepad</h1>
    </div>
    
    <p class="description">
      Add a password to {{ username }}'s notepad to keep your notes private.
    </p>

    <div class="form-group">
      <label>New Password</label>
      <input 
        type="password" 
        [(ngModel)]="newPassword" 
        placeholder="Min 4 characters"
      />
    </div>

    <div class="form-group">
      <label>Password Hint (Optional)</label>
      <input 
        type="text" 
        [(ngModel)]="passwordHint" 
        placeholder="Something to help you remember"
      />
    </div>

    <div class="actions">
      <button class="remove-btn" (click)="removePassword()" [disabled]="isLoading">Remove Password</button>
      <button class="save-btn" (click)="savePassword()" [disabled]="isLoading || !newPassword">
        {{ isLoading ? 'Saving...' : 'Set Password' }}
      </button>
    </div>

    <p class="error" *ngIf="error">{{ error }}</p>
    <p class="success" *ngIf="success">{{ success }}</p>
  </div>
</div>
