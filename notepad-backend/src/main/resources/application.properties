# ==============================
# SERVER
# ==============================
server.port=${PORT:8080}

# ==============================
# DATABASE (Supabase - Pooler)
# ==============================
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# IMPORTANT: Do NOT set username/password separately when using DATABASE_URL

# ==============================
# JPA / HIBERNATE
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Remove deprecated dialect (Hibernate auto-detects)
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==============================
# HIKARI CONNECTION POOL (TUNED FOR SUPABASE)
# ==============================
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# Required for Supabase SSL
spring.datasource.hikari.data-source-properties.sslmode=require

# Optional but useful
spring.datasource.hikari.connection-test-query=SELECT 1

# ==============================
# SPRING SECURITY (DISABLED)
# ==============================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ==============================
# LOGGING
# ==============================
logging.level.com.notesnap=DEBUG
logging.level.org.springframework.web=INFO

# ==============================
# APP CONFIG
# ==============================
notepad.character.limit=50000
notepad.expiry.days=10